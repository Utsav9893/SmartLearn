{% extends 'base.html' %}

{% block title %}Forgot Password - E-Learn Platform{% endblock %}

{% block content %}
<style>
    /* Scoped styles for the forgot password page */
    .forgot-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top right, #eef2ff, #f8fafc);
        padding: 60px 20px;
        font-family: 'Poppins', sans-serif;
    }

    .forgot-card {
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        width: 100%;
        max-width: 450px;
        padding: 40px;
        border: 1px solid #f1f5f9;
        animation: fadeUp 0.6s ease-out forwards;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .forgot-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .forgot-header i {
        font-size: 45px;
        color: #4f46e5;
        margin-bottom: 15px;
    }

    .forgot-header h2 {
        font-size: 28px;
        color: #0f172a;
        font-weight: 700;
        margin-bottom: 5px;
    }

    .forgot-header p {
        color: #64748b;
        font-size: 14px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #334155;
        font-weight: 600;
        font-size: 14px;
    }

    .form-control-custom {
        width: 100%;
        padding: 14px 15px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.3s ease;
        outline: none;
        color: #0f172a;
        background-color: #f8fafc;
    }

    .form-control-custom:focus {
        border-color: #4f46e5;
        background-color: #ffffff;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .btn-forgot {
        width: 100%;
        padding: 14px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
    }

    .btn-forgot:hover {
        background: #4338ca;
        transform: translateY(-2px);
    }

    .forgot-footer {
        text-align: center;
        margin-top: 25px;
        font-size: 14px;
        color: #64748b;
    }

    .forgot-footer a {
        color: #4f46e5;
        text-decoration: none;
        font-weight: 600;
    }
</style>

<div class="forgot-wrapper">
    <div class="forgot-card">
        <div class="forgot-header">
            <i class="fas fa-user-lock"></i>
            <h2>Forgot Password</h2>
            <p>Enter your username and we'll send you a new password.</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-control-custom" placeholder="Enter your username" required>
            </div>
            
            <button type="submit" class="btn-forgot">Send Password to Email</button>
        </form>
        
        <div class="forgot-footer">
            <p>Remember your password? <a href="{% url 'accounts:login' %}">Sign in here</a></p>
        </div>
    </div>
</div>
{% endblock %}
